<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Listo! — Florist Manager</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18041424603"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18041424603');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:  #2da84a;
      --green-mid:   #3db853;
      --green-light: #7ed957;
      --bg:          #f5faf6;
      --white:       #ffffff;
      --border:      #e0e8e2;
      --text:        #1a1a1a;
      --text2:       #4a5a4e;
      --muted:       #8a9e90;
    }
    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      animation: rise 0.35s ease both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 16px rgba(61,184,83,0.3);
    }
    .icon svg { width: 30px; height: 30px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: var(--text2);
      line-height: 1.55;
      margin-bottom: 2rem;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green-mid), var(--green-light));
      border-radius: 2px;
      transition: width 3s linear;
    }
    .btn-enter {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.93rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(61,184,83,0.3);
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .btn-enter:hover {
      filter: brightness(1.05);
      box-shadow: 0 6px 18px rgba(61,184,83,0.38);
    }
    .countdown {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.9rem;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>
  <h1>¡Listo!</h1>
  <p>Tu cuenta fue creada exitosamente.<br>Entrando a tu panel en un momento...</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <a href="#" class="btn-enter" id="btnEnter">Entrar ahora →</a>
  <div class="countdown" id="countdown">Redirigiendo en 3 segundos...</div>
</div>

<script>
  // Fire Google Ads conversion
  gtag('event', 'conversion', { send_to: 'AW-18041424603/mfw5COHW0Y8cENuV6ZpD' });

  // Get destination URL from query param
  const params = new URLSearchParams(location.search);
  const dest   = params.get('url') || '/';

  // Set manual button href
  document.getElementById('btnEnter').href = dest;

  // Animate progress bar
  requestAnimationFrame(() => {
    document.getElementById('progressFill').style.width = '100%';
  });

  // Countdown
  let secs = 3;
  const countEl = document.getElementById('countdown');
  const tick = setInterval(() => {
    secs--;
    if (secs <= 0) {
      clearInterval(tick);
      countEl.textContent = 'Redirigiendo...';
      window.location.href = dest;
    } else {
      countEl.textContent = `Redirigiendo en ${secs} segundo${secs !== 1 ? 's' : ''}...`;
    }
  }, 1000);
</script>
</body>
</html>
